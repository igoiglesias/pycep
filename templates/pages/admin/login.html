<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/css/simple.min.css') }}">
</head>
<body>
    <header>
        <h1>Admin Login</h1>
    </header>
    <main>
        {% if error %}
            <p style="color: red;">{{ error }}</p>
        {% endif %}
        <form action="{{ url_for('login') }}" method="post">
            <input type="text" name="username" placeholder="fulado@exemplo.com">
            <input type="password" name="password" placeholder="********">
            <button type="submit">Login</button>
        </form>
    </main>
    
</body>
</html>
